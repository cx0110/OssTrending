settings:
  enable_llm: false
  llm_top_n: 5
  top_list_limit: 10
  ai_model: "MiniMax-M2.7"
  ai_model_backup: "gpt-3.5-turbo"
  
  filters:
    min_total_stars: 100
    skip_no_description: true
  
  history_file: "data/history.json"
  archive_dir: "archives"
  readme_file: "README.md"
  readme_header: |
    # 📈 OSSInsight 每日精选
    
    每日自动更新 GitHub 热门项目精选，由 AI (MiniMax M2 / OpenAI) 辅助分析。

# language + period: 按编程语言 trending 抓取
# collection_id: 按 OSSInsight 分类抓取 (AI Agent Frameworks=10098, CICD=10020, Coding Agents=10106 等)
collections:
  # 编程语言
  - title: "🔥 全球热榜 (24h)"
    language: "All"
    period: "past_24_hours"

  - title: "🐍 Python (24h)"
    language: "Python"
    period: "past_24_hours"

  - title: "🐹 Go (24h)"
    language: "Go"
    period: "past_24_hours"

  - title: "📜 TypeScript (24h)"
    language: "TypeScript"
    period: "past_24_hours"

  # 热门分类
  - title: "🤖 AI Agent Frameworks"
    collection_id: 10098

  - title: "⚙️ CI/CD"
    collection_id: 10020

  - title: "🧠 Coding Agents"
    collection_id: 10106

  - title: "🎨 Artificial Intelligence"
    collection_id: 10010
