settings:
  enable_llm: false
  llm_top_n: 5
  top_list_limit: 10
  ai_model: "MiniMax-M2.7"
  ai_model_backup: "gpt-3.5-turbo"
  
  filters:
    min_total_stars: 100
    skip_no_description: true
  
  history_file: "data/history.json"
  archive_dir: "archives"
  readme_file: "README.md"
  readme_header: |
    # 📈 OSSInsight 每日精选
    
    每日自动更新 GitHub 热门项目精选，由 AI (MiniMax M2 / OpenAI) 辅助分析。

# language + period: 按编程语言 trending 抓取 (past_24_hours, past_week, past_month, past_year)
# collection_id + period: 按 OSSInsight 分类抓取 (period 用于 AI 分类的 28d 增长)
collections:
  # AI 分类 (近 28 天增长，来自 ossinsight.io/trending/ai)
  - title: "🤖 AI Agents (28d)"
    collection_id: 10098
    period: past_month

  - title: "🛠️ LLM Tools (28d)"
    collection_id: 10076
    period: past_month

  - title: "🔌 MCP Servers (28d)"
    collection_id: 10105
    period: past_month

  - title: "🧠 Coding Agents (28d)"
    collection_id: 10106
    period: past_month

  - title: "📚 RAG (28d)"
    collection_id: 10108
    period: past_month

  - title: "⚡ Inference (28d)"
    collection_id: 10109
    period: past_month

  - title: "🗃️ Vector DB (28d)"
    collection_id: 10077
    period: past_month

  - title: "✨ Vibe Coding (28d)"
    collection_id: 10107
    period: past_month

  - title: "🤖 AI Assistants (28d)"
    collection_id: 10112
    period: past_month

  # 编程语言 (每日热点)
  - title: "🔥 全球热榜 (24h)"
    language: "All"
    period: "past_24_hours"

  - title: "🐍 Python (24h)"
    language: "Python"
    period: "past_24_hours"

  - title: "🐹 Go (24h)"
    language: "Go"
    period: "past_24_hours"

  - title: "📜 TypeScript (24h)"
    language: "TypeScript"
    period: "past_24_hours"
