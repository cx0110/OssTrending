settings:
  enable_llm: false
  llm_top_n: 5
  top_list_limit: 10
  ai_model: "MiniMax-M2.7"
  history_file: "data/history.json"
  archive_dir: "archives"
  readme_file: "README.md"
  readme_header: |
    # 📈 OSSInsight 每日精选 (Top 10)
    
    每日自动更新 GitHub 热门项目，由 AI (MiniMax M2) 辅助分析。

# 这里定义你需要抓取的列表
# language: 编程语言 (All, Python, Go, Java, Rust, JavaScript, TypeScript, C++, etc.)
# period: 时间范围 (past_24_hours, past_week, past_month, past_year)
collections:
  - title: "🔥 全球热榜 (24h)"
    language: "All"
    period: "past_24_hours"

  - title: "🐹 Go 语言精选 (24h)"
    language: "Go"
    period: "past_24_hours"

  - title: "🐍 Python 热门 (24h)"
    language: "Python"
    period: "past_24_hours"
   # period: "past_week"
    
  - title: "🦀 Rust 新秀 (24h)"
    language: "Rust"
    period: "past_24_hours"
