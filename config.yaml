settings:
  enable_llm: false
  llm_top_n: 5
  top_list_limit: 10
  ai_model: "MiniMax-M2.7"
  ai_model_backup: "Llama 3"
  
  filters:
    min_total_stars: 100
    skip_no_description: true
  
  history_file: "data/history.json"
  archive_dir: "archives"
  readme_file: "README.md"
  readme_header: |
    # 📈 OSSInsight 每日精选
    
    每日自动更新 GitHub 热门项目精选，由 AI (MiniMax-M2.7 / Llama 3) 辅助分析。

# language + period: 按编程语言 trending 抓取 (past_24_hours, past_week, past_month, past_year)
# collection_name + period: 按 OSSInsight 分类名过滤 (period 用于 AI 分类的 28d 增长)
collections:
  # AI 分类 (近 28 天增长，来自 ossinsight.io/trending/ai)
  - title: "🤖 AI Agents (28d)"
    collection_name: "AI Agents"
    period: past_month

  - title: "🛠️ LLM Tools (28d)"
    collection_name: "LLM Tools"
    period: past_month

  - title: "🔌 MCP Servers (28d)"
    collection_name: "MCP Servers"
    period: past_month

  - title: "🧠 Coding Agents (28d)"
    collection_name: "Coding Agents"
    period: past_month

  - title: "📚 RAG (28d)"
    collection_name: "RAG"
    period: past_month

  - title: "⚡ Inference (28d)"
    collection_name: "LLM Inference Engines"
    period: past_month

  - title: "🗃️ Vector DB (28d)"
    collection_name: "Vector Search Engine"
    period: past_month

  - title: "✨ Vibe Coding (28d)"
    collection_name: "Vibe Coding Tools"
    period: past_month

  - title: "🤖 AI Assistants (28d)"
    collection_name: "AI Coding Assistants"
    period: past_month

  # 编程语言 (每日热点)
  - title: "🔥 全球热榜 (24h)"
    language: "All"
    period: "past_24_hours"

  - title: "🐍 Python (24h)"
    language: "Python"
    period: "past_24_hours"

  - title: "🐹 Go (24h)"
    language: "Go"
    period: "past_24_hours"

  - title: "📜 TypeScript (24h)"
    language: "TypeScript"
    period: "past_24_hours"
